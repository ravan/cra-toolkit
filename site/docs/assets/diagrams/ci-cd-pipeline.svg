<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 350" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#0C322C"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#C62828"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="350" fill="#FAFFFE" rx="4"/>

  <!-- Title -->
  <text x="550" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#0C322C">CI/CD Compliance Pipeline</text>
  <text x="550" y="48" text-anchor="middle" font-size="11" fill="#6B7280">GitHub Actions workflow -- artifacts flow between jobs</text>

  <!-- ── Job 1: generate-sbom ── -->
  <rect x="20" y="80" width="120" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="80" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">generate-sbom</text>
  <text x="80" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">syft</text>

  <!-- Artifact: sbom -->
  <rect x="48" y="148" width="64" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="80" y="162" text-anchor="middle" font-size="9" fill="#2E7D32">sbom.cdx.json</text>

  <!-- Arrow: sbom -> scan -->
  <line x1="140" y1="108" x2="170" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Job 2: scan ── -->
  <rect x="180" y="80" width="100" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="230" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">scan</text>
  <text x="230" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">grype</text>

  <!-- Artifact: scan -->
  <rect x="198" y="148" width="64" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="230" y="162" text-anchor="middle" font-size="9" fill="#2E7D32">grype.json</text>

  <!-- Arrow: scan -> vex -->
  <line x1="280" y1="108" x2="310" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Job 3: vex ── -->
  <rect x="320" y="80" width="100" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="370" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">vex</text>
  <text x="370" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">cra vex</text>

  <!-- Artifact: vex -->
  <rect x="338" y="148" width="64" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="370" y="162" text-anchor="middle" font-size="9" fill="#2E7D32">vex.json</text>

  <!-- Arrow: vex -> policykit -->
  <line x1="420" y1="108" x2="460" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Job 4: policykit (with gate) ── -->
  <rect x="470" y="80" width="120" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="530" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">policykit</text>
  <text x="530" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">cra policykit</text>

  <!-- Gate symbol (diamond) -->
  <polygon points="530,148 545,164 530,180 515,164" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="530" y="168" text-anchor="middle" font-size="10" font-weight="700" fill="#E65100">G</text>

  <!-- Gate label -->
  <text x="560" y="161" font-size="8" fill="#E65100">FAIL if critical</text>
  <text x="560" y="171" font-size="8" fill="#E65100">policies fail</text>

  <!-- Fail path (down from gate) -->
  <line x1="530" y1="180" x2="530" y2="210" stroke="#C62828" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <rect x="490" y="212" width="80" height="22" rx="4" fill="#FFEBEE" stroke="#C62828" stroke-width="1"/>
  <text x="530" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#C62828">Pipeline fails</text>

  <!-- Arrow: vex -> report (conditional, down from vex) -->
  <line x1="370" y1="136" x2="370" y2="240" stroke="#0C322C" stroke-width="1" stroke-dasharray="5,3"/>
  <line x1="370" y1="240" x2="630" y2="240" stroke="#0C322C" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- ── Job 5: report (conditional) ── -->
  <rect x="640" y="218" width="100" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="690" y="242" text-anchor="middle" font-size="11" font-weight="700" fill="white">report</text>
  <text x="690" y="258" text-anchor="middle" font-size="9" fill="#E8F5E9">cra report</text>
  <!-- Conditional badge -->
  <rect x="706" y="214" width="56" height="16" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="734" y="225" text-anchor="middle" font-size="8" font-weight="600" fill="#E65100">conditional</text>

  <!-- Arrow: policykit -> csaf -->
  <line x1="590" y1="108" x2="640" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Job 6: csaf ── -->
  <rect x="650" y="80" width="100" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="700" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">csaf</text>
  <text x="700" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">cra csaf</text>

  <!-- Artifact: csaf -->
  <rect x="668" y="148" width="64" height="20" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="700" y="162" text-anchor="middle" font-size="9" fill="#2E7D32">advisory.json</text>

  <!-- Arrow: csaf -> evidence -->
  <line x1="750" y1="108" x2="800" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Job 7: evidence (with signing) ── -->
  <rect x="810" y="80" width="130" height="56" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="875" y="104" text-anchor="middle" font-size="11" font-weight="700" fill="white">evidence</text>
  <text x="875" y="120" text-anchor="middle" font-size="9" fill="#E8F5E9">cra evidence</text>

  <!-- Signing symbol (lock icon) -->
  <rect x="948" y="84" width="24" height="18" rx="3" fill="#1B5E20" stroke="#0C322C" stroke-width="1"/>
  <rect x="954" y="76" width="12" height="12" rx="6" fill="none" stroke="#0C322C" stroke-width="1.5"/>
  <text x="960" y="98" text-anchor="middle" font-size="10" fill="white">S</text>

  <!-- Output: Evidence Bundle -->
  <polygon points="990,88 1080,88 1068,128 1002,128" fill="#E8F5E9" stroke="#0C322C" stroke-width="1.5"/>
  <text x="1038" y="105" text-anchor="middle" font-size="10" font-weight="600" fill="#0C322C">Evidence</text>
  <text x="1038" y="117" text-anchor="middle" font-size="10" font-weight="600" fill="#0C322C">Bundle</text>

  <!-- Arrow: evidence -> output -->
  <line x1="940" y1="108" x2="994" y2="108" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ── Legend ── -->
  <rect x="20" y="300" width="14" height="14" rx="3" fill="#30BA78" stroke="#0C322C" stroke-width="1"/>
  <text x="40" y="312" font-size="10" fill="#0C322C">CI job</text>

  <rect x="110" y="300" width="14" height="14" rx="3" fill="#30BA78" stroke="#0C322C" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="130" y="312" font-size="10" fill="#0C322C">Conditional job</text>

  <rect x="250" y="300" width="40" height="14" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="296" y="312" font-size="10" fill="#0C322C">Artifact</text>

  <polygon points="370,300 382,300 382,314 370,314" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="390" y="312" font-size="10" fill="#0C322C">Policy gate</text>

  <rect x="470" y="300" width="14" height="14" rx="3" fill="#1B5E20" stroke="#0C322C" stroke-width="1"/>
  <text x="490" y="312" font-size="10" fill="#0C322C">Signing</text>

  <line x1="560" y1="307" x2="590" y2="307" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="598" y="312" font-size="10" fill="#0C322C">Job dependency</text>

  <line x1="710" y1="307" x2="740" y2="307" stroke="#0C322C" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="748" y="312" font-size="10" fill="#0C322C">Conditional flow</text>
</svg>
