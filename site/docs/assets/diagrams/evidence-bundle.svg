<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 550" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#0C322C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="550" fill="#FAFFFE" rx="4"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0C322C">Evidence Bundle Pipeline</text>
  <text x="550" y="46" font-size="11" text-anchor="middle" fill="#2E7D32">Six-stage pipeline from artifact collection to signed archive</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Pipeline stages -->
  <!-- ══════════════════════════════════════════════ -->

  <!-- Stage 1: Collection -->
  <rect x="20" y="70" width="150" height="65" rx="10" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="95" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#0C322C">1. Collection</text>
  <text x="95" y="112" text-anchor="middle" font-size="9" fill="#2E7D32">Gather artifacts</text>
  <text x="95" y="124" text-anchor="middle" font-size="9" fill="#2E7D32">from specified paths</text>

  <!-- Arrow 1->2 -->
  <line x1="170" y1="102" x2="195" y2="102" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 2: Validation -->
  <rect x="200" y="70" width="150" height="65" rx="10" fill="#A5D6A7" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="275" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="#0C322C">2. Validation</text>
  <text x="275" y="112" text-anchor="middle" font-size="9" fill="#2E7D32">Verify format</text>
  <text x="275" y="124" text-anchor="middle" font-size="9" fill="#2E7D32">correctness</text>

  <!-- Arrow 2->3 -->
  <line x1="350" y1="102" x2="375" y2="102" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 3: Cross-validation -->
  <rect x="380" y="70" width="150" height="65" rx="10" fill="#81C784" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="455" y="90" text-anchor="middle" font-size="12" font-weight="700" fill="#0C322C">3. Cross-</text>
  <text x="455" y="105" text-anchor="middle" font-size="12" font-weight="700" fill="#0C322C">validation</text>
  <text x="455" y="122" text-anchor="middle" font-size="9" fill="#2E7D32">Check consistency</text>

  <!-- Arrow 3->4 -->
  <line x1="530" y1="102" x2="555" y2="102" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 4: Assembly -->
  <rect x="560" y="70" width="150" height="65" rx="10" fill="#66BB6A" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="635" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">4. Assembly</text>
  <text x="635" y="112" text-anchor="middle" font-size="9" fill="#E8F5E9">Construct bundle</text>
  <text x="635" y="124" text-anchor="middle" font-size="9" fill="#E8F5E9">with manifest</text>

  <!-- Arrow 4->5 -->
  <line x1="710" y1="102" x2="735" y2="102" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 5: Signing -->
  <rect x="740" y="70" width="150" height="65" rx="10" fill="#2E7D32" stroke="#0C322C" stroke-width="1.5"/>
  <text x="815" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">5. Signing</text>
  <text x="815" y="112" text-anchor="middle" font-size="9" fill="#C8E6C9">Cosign keyless</text>
  <text x="815" y="124" text-anchor="middle" font-size="9" fill="#C8E6C9">or key-based</text>

  <!-- Arrow 5->6 -->
  <line x1="890" y1="102" x2="915" y2="102" stroke="#0C322C" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Stage 6: Archive -->
  <rect x="920" y="70" width="150" height="65" rx="10" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="995" y="95" text-anchor="middle" font-size="12" font-weight="700" fill="white">6. Archive</text>
  <text x="995" y="112" text-anchor="middle" font-size="9" fill="#81C784">Create .tar.gz</text>
  <text x="995" y="124" text-anchor="middle" font-size="9" fill="#81C784">(optional)</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Divider -->
  <!-- ══════════════════════════════════════════════ -->
  <line x1="30" y1="165" x2="1070" y2="165" stroke="#C8E6C9" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="550" y="185" text-anchor="middle" font-size="13" font-weight="700" fill="#0C322C">Bundle Anatomy</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Directory tree -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="30" y="200" width="500" height="320" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>

  <!-- Tree root -->
  <text x="50" y="225" font-size="12" font-weight="700" fill="#0C322C">evidence-bundle/</text>

  <text x="70" y="248" font-size="11" fill="#0C322C">manifest.json</text>
  <text x="260" y="248" font-size="9" fill="#666">Bundle metadata, timestamps, checksums</text>

  <text x="70" y="270" font-size="11" font-weight="600" fill="#0C322C">sbom/</text>
  <text x="90" y="289" font-size="10" fill="#2E7D32">sbom.cdx.json</text>
  <text x="260" y="289" font-size="9" fill="#666">CycloneDX or SPDX — Annex VII 2(b)</text>

  <text x="70" y="311" font-size="11" font-weight="600" fill="#0C322C">vex/</text>
  <text x="90" y="330" font-size="10" fill="#2E7D32">vex.openvex.json</text>
  <text x="260" y="330" font-size="9" fill="#666">VEX document — Annex VII 2(b)</text>

  <text x="70" y="352" font-size="11" font-weight="600" fill="#0C322C">scans/</text>
  <text x="90" y="371" font-size="10" fill="#2E7D32">grype.json, trivy.json</text>
  <text x="260" y="371" font-size="9" fill="#666">Scan results — Annex VII 6</text>

  <text x="70" y="393" font-size="11" font-weight="600" fill="#0C322C">policy/</text>
  <text x="90" y="412" font-size="10" fill="#2E7D32">policy-report.json</text>
  <text x="260" y="412" font-size="9" fill="#666">PolicyKit output — Annex VII 6</text>

  <text x="70" y="434" font-size="11" font-weight="600" fill="#0C322C">advisories/</text>
  <text x="90" y="453" font-size="10" fill="#2E7D32">csaf.json, art14-report.json</text>
  <text x="260" y="453" font-size="9" fill="#666">CSAF + Art. 14 — Annex VII 2(b)</text>

  <text x="70" y="475" font-size="11" font-weight="600" fill="#0C322C">manual/</text>
  <text x="90" y="494" font-size="10" fill="#2E7D32">risk-assessment, architecture, ...</text>
  <text x="260" y="494" font-size="9" fill="#666">Manual artifacts — Annex VII 2-7</text>

  <!-- ══════════════════════════════════════════════ -->
  <!-- Artifact source mapping (right side) -->
  <!-- ══════════════════════════════════════════════ -->
  <rect x="570" y="200" width="500" height="320" rx="8" fill="#FAFFFE" stroke="#0C322C" stroke-width="1"/>
  <text x="820" y="225" text-anchor="middle" font-size="12" font-weight="700" fill="#0C322C">Artifact Sources</text>

  <!-- Automated -->
  <text x="590" y="253" font-size="11" font-weight="600" fill="#2E7D32">Automated (from CRA toolkit)</text>

  <rect x="600" y="263" width="100" height="24" rx="5" fill="#30BA78"/>
  <text x="650" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="white">cra vex</text>
  <text x="710" y="279" font-size="9" fill="#666">VEX document</text>

  <rect x="600" y="295" width="100" height="24" rx="5" fill="#30BA78"/>
  <text x="650" y="311" text-anchor="middle" font-size="10" font-weight="600" fill="white">cra policykit</text>
  <text x="710" y="311" font-size="9" fill="#666">Policy evaluation report</text>

  <rect x="600" y="327" width="100" height="24" rx="5" fill="#30BA78"/>
  <text x="650" y="343" text-anchor="middle" font-size="10" font-weight="600" fill="white">cra csaf</text>
  <text x="710" y="343" font-size="9" fill="#666">CSAF advisory</text>

  <rect x="600" y="359" width="100" height="24" rx="5" fill="#30BA78"/>
  <text x="650" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="white">cra report</text>
  <text x="710" y="375" font-size="9" fill="#666">Art. 14 notification</text>

  <!-- External -->
  <text x="590" y="410" font-size="11" font-weight="600" fill="#0C322C">External tools</text>

  <rect x="600" y="418" width="100" height="24" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="650" y="434" text-anchor="middle" font-size="10" fill="#2E7D32">syft / cdxgen</text>
  <text x="710" y="434" font-size="9" fill="#666">SBOM generation</text>

  <rect x="600" y="450" width="100" height="24" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="0.8"/>
  <text x="650" y="466" text-anchor="middle" font-size="10" fill="#2E7D32">Grype / Trivy</text>
  <text x="710" y="466" font-size="9" fill="#666">Vulnerability scanning</text>

  <!-- Manual -->
  <text x="830" y="253" font-size="11" font-weight="600" fill="#0C322C">Manual artifacts</text>

  <text x="840" y="275" font-size="10" fill="#666">Risk assessment</text>
  <text x="840" y="293" font-size="10" fill="#666">Architecture docs</text>
  <text x="840" y="311" font-size="10" fill="#666">Production process</text>
  <text x="840" y="329" font-size="10" fill="#666">EU declaration</text>
  <text x="840" y="347" font-size="10" fill="#666">CVD policy</text>
  <text x="840" y="365" font-size="10" fill="#666">Harmonised standards</text>
  <text x="840" y="383" font-size="10" fill="#666">Product config</text>
</svg>
