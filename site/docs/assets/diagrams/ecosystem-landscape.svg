<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" font-family="Inter, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="10" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 z" fill="#0C322C"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" fill="#FAFFFE" rx="4"/>

  <!-- Title -->
  <text x="550" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#0C322C">CRA Compliance Ecosystem Landscape</text>
  <text x="550" y="46" text-anchor="middle" font-size="11" fill="#2E7D32">Three layers: toolkit, tools, and standards</text>

  <!-- ══════════════════════════════════════ -->
  <!-- Layer 1: CRA Toolkit (top) -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="65" width="1040" height="100" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="80" y="86" font-size="11" font-weight="700" fill="#2E7D32">CRA TOOLKIT</text>

  <!-- VEX -->
  <rect x="60" y="98" width="160" height="52" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="140" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">VEX</text>
  <text x="140" y="138" text-anchor="middle" font-size="9" fill="#E8F5E9">Exploitability analysis</text>

  <!-- PolicyKit -->
  <rect x="250" y="98" width="160" height="52" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="330" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">PolicyKit</text>
  <text x="330" y="138" text-anchor="middle" font-size="9" fill="#E8F5E9">OPA policy evaluation</text>

  <!-- Report -->
  <rect x="440" y="98" width="160" height="52" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="520" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">Report</text>
  <text x="520" y="138" text-anchor="middle" font-size="9" fill="#E8F5E9">Art. 14 notifications</text>

  <!-- Evidence -->
  <rect x="630" y="98" width="160" height="52" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="710" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">Evidence</text>
  <text x="710" y="138" text-anchor="middle" font-size="9" fill="#E8F5E9">Bundle and sign</text>

  <!-- CSAF -->
  <rect x="820" y="98" width="160" height="52" rx="8" fill="#30BA78" stroke="#0C322C" stroke-width="1.5"/>
  <text x="900" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="white">CSAF</text>
  <text x="900" y="138" text-anchor="middle" font-size="9" fill="#E8F5E9">Advisory generation</text>

  <!-- ══════════════════════════════════════ -->
  <!-- Layer 2: Tools (middle) -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="205" width="1040" height="100" rx="10" fill="white" stroke="#0C322C" stroke-width="1.5"/>
  <text x="80" y="226" font-size="11" font-weight="700" fill="#0C322C">TOOLS</text>

  <!-- Grype -->
  <rect x="60" y="238" width="150" height="52" rx="8" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="135" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="white">Grype</text>
  <text x="135" y="278" text-anchor="middle" font-size="9" fill="#30BA78">Vulnerability scanner</text>

  <!-- Trivy -->
  <rect x="240" y="238" width="150" height="52" rx="8" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="315" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="white">Trivy</text>
  <text x="315" y="278" text-anchor="middle" font-size="9" fill="#30BA78">Vulnerability scanner</text>

  <!-- Cosign -->
  <rect x="420" y="238" width="150" height="52" rx="8" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="495" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="white">Cosign</text>
  <text x="495" y="278" text-anchor="middle" font-size="9" fill="#30BA78">Signing / verification</text>

  <!-- syft/cdxgen -->
  <rect x="600" y="238" width="150" height="52" rx="8" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="675" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="white">syft / cdxgen</text>
  <text x="675" y="278" text-anchor="middle" font-size="9" fill="#30BA78">SBOM generation</text>

  <!-- govulncheck -->
  <rect x="780" y="238" width="150" height="52" rx="8" fill="#0C322C" stroke="#0C322C" stroke-width="1.5"/>
  <text x="855" y="260" text-anchor="middle" font-size="12" font-weight="700" fill="white">govulncheck</text>
  <text x="855" y="278" text-anchor="middle" font-size="9" fill="#30BA78">Go reachability</text>

  <!-- ══════════════════════════════════════ -->
  <!-- Layer 3: Standards (bottom) -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="345" width="1040" height="100" rx="10" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="80" y="366" font-size="11" font-weight="700" fill="#2E7D32">STANDARDS</text>

  <!-- OpenVEX -->
  <rect x="45" y="378" width="120" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="105" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">OpenVEX</text>

  <!-- CSAF 2.0 -->
  <rect x="185" y="378" width="120" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="245" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">CSAF 2.0</text>

  <!-- CycloneDX -->
  <rect x="325" y="378" width="120" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="385" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">CycloneDX</text>

  <!-- SPDX -->
  <rect x="465" y="378" width="100" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="515" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">SPDX</text>

  <!-- SLSA -->
  <rect x="585" y="378" width="100" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="635" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">SLSA</text>

  <!-- SARIF -->
  <rect x="705" y="378" width="100" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="755" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">SARIF</text>

  <!-- OPA/Rego -->
  <rect x="825" y="378" width="120" height="48" rx="8" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="885" y="406" text-anchor="middle" font-size="11" font-weight="600" fill="white">OPA / Rego</text>

  <!-- ══════════════════════════════════════ -->
  <!-- Connecting lines: Tools -> Toolkit -->
  <!-- ══════════════════════════════════════ -->
  <!-- Grype -> VEX -->
  <line x1="120" y1="238" x2="130" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.5"/>
  <!-- Grype -> CSAF -->
  <line x1="150" y1="238" x2="870" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>

  <!-- Trivy -> VEX -->
  <line x1="290" y1="238" x2="155" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.5"/>
  <!-- Trivy -> CSAF -->
  <line x1="340" y1="238" x2="890" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>

  <!-- Cosign -> Evidence -->
  <line x1="495" y1="238" x2="710" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.5"/>

  <!-- syft/cdxgen -> VEX, Report, Evidence, CSAF -->
  <line x1="650" y1="238" x2="140" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>
  <line x1="660" y1="238" x2="520" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>
  <line x1="680" y1="238" x2="900" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>

  <!-- govulncheck -> VEX -->
  <line x1="820" y1="238" x2="160" y2="150" stroke="#0C322C" stroke-width="1" opacity="0.3"/>

  <!-- ══════════════════════════════════════ -->
  <!-- Connecting lines: Standards -> Tools -->
  <!-- ══════════════════════════════════════ -->
  <!-- OpenVEX -> Grype (output), VEX tool -->
  <line x1="105" y1="378" x2="120" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- CSAF 2.0 -> Trivy (advisory), CSAF tool -->
  <line x1="245" y1="378" x2="315" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- CycloneDX -> syft/cdxgen -->
  <line x1="385" y1="378" x2="660" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
  <!-- CycloneDX -> Grype -->
  <line x1="360" y1="378" x2="135" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>
  <!-- CycloneDX -> Trivy -->
  <line x1="370" y1="378" x2="315" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- SPDX -> syft/cdxgen -->
  <line x1="530" y1="378" x2="675" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- SLSA -> Cosign -->
  <line x1="635" y1="378" x2="495" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- SARIF -> Grype, Trivy -->
  <line x1="740" y1="378" x2="150" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>
  <line x1="745" y1="378" x2="330" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>

  <!-- OPA/Rego -> PolicyKit (direct) -->
  <line x1="885" y1="378" x2="855" y2="290" stroke="#2E7D32" stroke-width="1" opacity="0.4"/>

  <!-- ══════════════════════════════════════ -->
  <!-- Legend -->
  <!-- ══════════════════════════════════════ -->
  <rect x="30" y="460" width="14" height="14" rx="3" fill="#30BA78" stroke="#0C322C" stroke-width="1"/>
  <text x="50" y="471" font-size="10" fill="#0C322C">CRA Toolkit tool</text>
  <rect x="180" y="460" width="14" height="14" rx="3" fill="#0C322C" stroke="#0C322C" stroke-width="1"/>
  <text x="200" y="471" font-size="10" fill="#0C322C">Ecosystem tool</text>
  <rect x="320" y="460" width="14" height="14" rx="3" fill="#2E7D32" stroke="#0C322C" stroke-width="1"/>
  <text x="340" y="471" font-size="10" fill="#0C322C">Standard / format</text>
  <line x1="480" y1="467" x2="520" y2="467" stroke="#0C322C" stroke-width="1" opacity="0.5"/>
  <text x="528" y="471" font-size="10" fill="#0C322C">Data flow</text>
</svg>